<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berkcan Selçuk | Sigorta Danışmanı</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
max-width:700px;
width:100%;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:35px;
font-size:18px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.features{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin:25px 0;
}

.feature{
background:#334155;
padding:15px;
border-radius:12px;
font-size:14px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#1d4ed8;
}

input,select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#475569;
color:white;
font-size:15px;
}

.success{
display:none;
margin-top:20px;
background:#16a34a;
padding:15px;
border-radius:12px;
}

.contact{
margin-top:25px;
font-size:14px;
opacity:0.8;
}

a{
color:#93c5fd;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Berkcan Selçuk</h1>
<div class="subtitle">
Sigorta & Risk Danışmanlığı
</div>

<div class="card">

<select id="type">
<option>Trafik Sigortası</option>
<option>Kasko Sigortası</option>
<option>Sağlık Sigortası</option>
<option>DASK</option>
<option>Konut Sigortası</option>
<option>İşyeri Sigortası</option>
<option>Seyahat Sigortası</option>
</select>

<input type="text" id="name" placeholder="Ad Soyad">

<input type="tel" id="phone" placeholder="Telefon">

<button onclick="sendLead()">
Teklif Al
</button>

<div class="success" id="success">
Talebiniz başarıyla alındı. En kısa sürede dönüş sağlanacaktır.
</div>

<div class="features">
<div class="feature">⚡ Hızlı Teklif</div>
<div class="feature">🛡️ Güvenilir Hizmet</div>
<div class="feature">📞 7/24 Destek</div>
<div class="feature">💰 Uygun Fiyat</div>
</div>

<div class="contact">
📍 Denizli / Türkiye<br><br>
📞 <a href="tel:+905459173353">0545 917 33 53</a>
</div>

</div>
</div>

<script>
function sendLead(){

let data = {
type:document.getElementById("type").value,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value
};

fetch(https://script.google.com/macros/s/AKfycbxEnm7UwTth16zy5wsBfhvTkRuZJsjI1nfrA83HjV_K-Wl0Uk2iXB3iM0anCs28FDVy/exec,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(response=>{
document.getElementById("success").style.display="block";
document.getElementById("name").value="";
document.getElementById("phone").value="";
});

}
</script>

</body>
</html>
